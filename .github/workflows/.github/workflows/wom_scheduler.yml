name: 5-Year Weekly SOTW Launcher
on:
  schedule:
    - cron: '0 18 * * 6' # Fires every single Saturday at 6:00 PM UTC

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python wom_weekly.py

      - name: Commit and Push History Update
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Force create the tracking file if it didn't exist locally
          touch wom_history.txt
          git add wom_history.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "Automation: Update weekly skill tracking history [skip ci]"
            git push
          else
            echo "No history changes to commit."
          fi
