name: 5-Year Weekly SOTW Launcher
on:
  schedule:
    - cron: '0 18 * * 6' # Fires every single Saturday at 6:00 PM UTC

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Double-enforces write permissions inside the environment

    steps:
      # 1. Pull down the repository code and tracking history
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Set up the Python execution environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install network request dependencies
      - name: Install dependencies
        run: pip install requests

      # 4. Run your python randomizer script
      - name: Run script
        run: python wom_weekly.py

      # 5. Commit and push the updated history file back to GitHub
      - name: Commit and Push History Update
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add wom_history.txt
          
          # Only commit if the history file actually changed
          if ! git diff --cached --quiet; then
            git commit -m "Automation: Update weekly skill tracking history [skip ci]"
            git push
          else
            echo "No history changes to commit."
          fi
